{% extends "base.html" %}

{% block title %}NamEngine{% endblock %}

{% block content %}
<section class="home-hero">
  <div class="home-hero-inner">
    <p class="home-eyebrow">The TASTE ENGINE</p>
    <h1 class="home-headline">Find the name<br>that feels right.</h1>
    <p class="home-sub">
      NamEngine shapes names around the thing you are naming, then learns from
      your reactions until it feels just right.
    </p>
    <a class="home-cta" href="#verticals">Pick your vertical &darr;</a>
  </div>
</section>

<section class="home-verticals" id="verticals" aria-label="Choose a vertical">
  <div class="home-vertical-grid">

    <a class="home-vert-card" href="/pet" aria-label="NamEngine Pet">
      <img src="{{ url_for('static', filename='images/pet/namengine-pet-card-logo.png') }}"
           alt="NamEngine Pet" class="home-vert-logo">
    </a>

    <a class="home-vert-card" href="/baby" aria-label="NamEngine Baby">
      <img src="{{ url_for('static', filename='images/baby/namengine-baby-card-logo.png') }}"
           alt="NamEngine Baby" class="home-vert-logo">
    </a>

    <a class="home-vert-card" href="/business" aria-label="NamEngine Business">
      <img src="{{ url_for('static', filename='images/business/namengine-business-card-logo.png') }}"
           alt="NamEngine Business" class="home-vert-logo">
    </a>

    <a class="home-vert-card" href="/character" aria-label="NamEngine Character">
      <img src="{{ url_for('static', filename='images/character/namengine-character-card-logo.png') }}"
           alt="NamEngine Character" class="home-vert-logo">
    </a>

  </div>
</section>
{% endblock %}
