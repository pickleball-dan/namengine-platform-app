# Starter graphics briefs for NamEngine vertical launches.
# Copy one entry, tune it, then translate the approved choices into VerticalConfig.theme,
# VerticalConfig.assets, intake groups, result labels, and visual QA checks.

baby:
  vertical_name: Baby
  object_label: baby name
  emotional_tone:
    - tender
    - thoughtful
    - future-facing
  primary_audience:
    - expecting parents
    - naming partners
  color_direction:
    grounding: "#7d95c7"
    deep: "#29344f"
    warm: "#f0b8c8"
    page: "#f7fbff"
  illustration_theme:
    - baby keepsake blanket
    - embroidered name
    - family-fit cue
  hero_headline_style: direct and emotionally clear
  background_motif: soft keepsake paper
  result_card_design: practical parent decision card
  supporting_visual_elements:
    - pronunciation
    - initials
    - meaning
    - family fit

